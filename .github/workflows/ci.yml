name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow other workflows (e.g. release.yml) to reuse this gate verbatim.
  workflow_call:

# Least privilege: this gate only reads the repo. Set explicitly so it never
# depends on the repository-level default token permission.
permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      # Third-party actions are pinned to a full commit SHA (not a moving tag)
      # so a hijacked tag can't inject into the pipeline. Dependabot keeps them
      # current via the `github-actions` ecosystem.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
